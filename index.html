<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oura Smart Alarm Prototype</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        // Lucide icons as SVG components
        const Moon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        );
        
        const Activity = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );
        
        const Clock = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );
        
        const Bell = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
        );
        
        const TrendingUp = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );
        
        const AlertCircle = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        function OuraSleepAlarmPrototype() {
            const [clientId, setClientId] = useState('');
            const [clientSecret, setClientSecret] = useState('');
            const [accessToken, setAccessToken] = useState('');
            const [isConnected, setIsConnected] = useState(false);
            const [sleepData, setSleepData] = useState(null);
            const [currentStage, setCurrentStage] = useState(null);
            const [alarmWindow, setAlarmWindow] = useState({ start: '06:30', end: '07:30' });
            const [isMonitoring, setIsMonitoring] = useState(false);
            const [logs, setLogs] = useState([]);
            const [sleepStages, setSleepStages] = useState([]);
            const [authCode, setAuthCode] = useState('');

            // Add log entry
            const addLog = (message, type = 'info') => {
                const timestamp = new Date().toLocaleTimeString();
                setLogs(prev => [...prev, { timestamp, message, type }].slice(-15));
            };

            // Start OAuth 2.0 flow
            const startOAuthFlow = () => {
                if (!clientId) {
                    addLog('Please enter your Client ID', 'error');
                    return;
                }
                
                addLog('Starting OAuth flow...', 'info');
                
                // Save client ID to localStorage so it persists after redirect
                localStorage.setItem('oura_client_id', clientId);
                if (clientSecret) {
                    localStorage.setItem('oura_client_secret', clientSecret);
                }
                
                // Redirect URL - in production this should be your app's callback
                const redirectUri = window.location.origin + window.location.pathname;
                addLog(`Using redirect URI: ${redirectUri}`, 'info');
                addLog('⚠️ Make sure this EXACTLY matches your Oura OAuth app settings!', 'info');
                
                const scope = 'daily personal email';
                
                // Build authorization URL
                const authUrl = `https://cloud.ouraring.com/oauth/authorize?` +
                    `response_type=code&` +
                    `client_id=${encodeURIComponent(clientId)}&` +
                    `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                    `scope=${encodeURIComponent(scope)}`;
                
                addLog('Redirecting to Oura authorization page...', 'info');
                
                // Redirect to Oura authorization page
                window.location.href = authUrl;
            };
            
            // Exchange authorization code for access token
            const exchangeCodeForToken = async () => {
                addLog('--- TOKEN EXCHANGE DEBUG ---', 'info');
                addLog(`Auth Code present: ${!!authCode}`, 'info');
                addLog(`Client ID present: ${!!clientId}`, 'info');
                addLog(`Client Secret present: ${!!clientSecret}`, 'info');
                
                if (!authCode || !clientId || !clientSecret) {
                    addLog('Missing auth code, client ID, or secret', 'error');
                    if (!authCode) addLog('Missing: Authorization code', 'error');
                    if (!clientId) addLog('Missing: Client ID', 'error');
                    if (!clientSecret) addLog('Missing: Client Secret', 'error');
                    return;
                }
                
                addLog('Exchanging authorization code for access token...', 'info');
                
                try {
                    // In a real app, this should be done on your backend to protect client secret
                    // This is just for testing purposes
                    const redirectUri = window.location.origin + window.location.pathname;
                    
                    addLog(`Using redirect URI: ${redirectUri}`, 'info');
                    addLog(`Using client ID: ${clientId.substring(0, 10)}...`, 'info');
                    
                    const response = await fetch('https://api.ouraring.com/oauth/token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            grant_type: 'authorization_code',
                            code: authCode,
                            redirect_uri: redirectUri,
                            client_id: clientId,
                            client_secret: clientSecret,
                        })
                    });
                    
                    if (!response.ok) {
                        const error = await response.text();
                        throw new Error(`Token exchange failed: ${response.status} - ${error}`);
                    }
                    
                    const tokenData = await response.json();
                    setAccessToken(tokenData.access_token);
                    addLog('✓ Access token obtained!', 'success');
                    
                    // Clear saved credentials after successful connection
                    localStorage.removeItem('oura_client_id');
                    localStorage.removeItem('oura_client_secret');
                    
                    // Now connect with the token
                    await connectToOura(tokenData.access_token);
                    
                } catch (error) {
                    addLog(`Token exchange failed: ${error.message}`, 'error');
                }
            };
            
            // Connect to Oura API with access token
            const connectToOura = async (token) => {
                const useToken = token || accessToken;
                
                if (!useToken) {
                    addLog('No access token available', 'error');
                    return;
                }
                
                addLog('Connecting to Oura API...', 'info');
                
                try {
                    const response = await fetch('https://api.ouraring.com/v2/usercollection/personal_info', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${useToken}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status} - ${response.statusText}`);
                    }
                    
                    const userData = await response.json();
                    setIsConnected(true);
                    addLog(`✓ Connected! User ID: ${userData.id || 'N/A'}`, 'success');
                    
                    // Fetch today's sleep data
                    addLog('Fetching recent sleep sessions...', 'info');
                    await fetchSleepSessions(useToken);
                    
                } catch (error) {
                    addLog(`Connection failed: ${error.message}`, 'error');
                    setIsConnected(false);
                }
            };
            
            // Check for OAuth callback on page load
            React.useEffect(() => {
                // Restore saved credentials
                const savedClientId = localStorage.getItem('oura_client_id');
                const savedClientSecret = localStorage.getItem('oura_client_secret');
                
                if (savedClientId) {
                    setClientId(savedClientId);
                    addLog('Restored Client ID from previous session', 'info');
                }
                if (savedClientSecret) {
                    setClientSecret(savedClientSecret);
                    addLog('Restored Client Secret from previous session', 'info');
                }
                
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                
                if (error) {
                    addLog(`OAuth error: ${error}`, 'error');
                    const errorDesc = urlParams.get('error_description');
                    if (errorDesc) {
                        addLog(`Details: ${errorDesc}`, 'error');
                    }
                } else if (code) {
                    addLog(`✓ Authorization code received from Oura`, 'success');
                    addLog(`Code: ${code.substring(0, 10)}...`, 'info');
                    setAuthCode(code);
                    // Clean up URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, []);

            // Fetch sleep sessions from Oura API
            const fetchSleepSessions = async (token) => {
                const useToken = token || accessToken;
                
                try {
                    // Get sleep data for the last 3 days
                    const endDate = new Date().toISOString().split('T')[0];
                    const startDate = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                    
                    addLog(`Querying sleep data from ${startDate} to ${endDate}...`, 'info');
                    
                    const response = await fetch(
                        `https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=${startDate}&end_date=${endDate}`,
                        {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${useToken}`
                            }
                        }
                    );
                    
                    if (!response.ok) {
                        throw new Error(`Failed to fetch sleep data: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.data && data.data.length > 0) {
                        const latestSleep = data.data[data.data.length - 1];
                        setSleepData(latestSleep);
                        addLog(`✓ Sleep session found: ${latestSleep.day}`, 'success');
                        addLog(`Sleep score: ${latestSleep.score || 'N/A'}/100`, 'info');
                        addLog(`Total sleep: ${Math.round(latestSleep.total_sleep_duration / 60)} minutes`, 'info');
                        
                        // Now fetch detailed sleep periods (hypnogram)
                        await fetchSleepPeriods(startDate, endDate, useToken);
                    } else {
                        addLog('⚠ No recent sleep sessions found', 'error');
                        addLog('Make sure you wore your Oura Ring last night', 'info');
                    }
                    
                } catch (error) {
                    addLog(`Error fetching sleep data: ${error.message}`, 'error');
                }
            };

            // Fetch detailed sleep periods (includes sleep stages)
            const fetchSleepPeriods = async (startDate, endDate, token) => {
                const useToken = token || accessToken;
                
                try {
                    const response = await fetch(
                        `https://api.ouraring.com/v2/usercollection/sleep?start_date=${startDate}&end_date=${endDate}`,
                        {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${useToken}`
                            }
                        }
                    );
                    
                    if (!response.ok) {
                        throw new Error(`Failed to fetch sleep periods: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.data && data.data.length > 0) {
                        const latestPeriod = data.data[data.data.length - 1];
                        addLog(`✓ Sleep period details loaded`, 'success');
                        
                        // Parse sleep stages (sleep_phase_5_min)
                        if (latestPeriod.sleep_phase_5_min) {
                            const stages = latestPeriod.sleep_phase_5_min;
                            setSleepStages(stages);
                            
                            // Map Oura's numeric codes to stage names
                            // 1=deep, 2=light, 3=REM, 4=awake
                            const stageMap = { '1': 'deep', '2': 'light', '3': 'REM', '4': 'awake' };
                            const stageCounts = stages.reduce((acc, stage) => {
                                const stageName = stageMap[stage] || 'unknown';
                                acc[stageName] = (acc[stageName] || 0) + 1;
                                return acc;
                            }, {});
                            
                            addLog(`Stage breakdown: ${Object.entries(stageCounts).map(([s, c]) => `${s}=${c*5}min`).join(', ')}`, 'info');
                            addLog(`✓ Ready to analyze optimal wake times`, 'success');
                        } else {
                            addLog('⚠ No detailed sleep stage data available', 'error');
                        }
                    }
                    
                } catch (error) {
                    addLog(`Error fetching sleep periods: ${error.message}`, 'error');
                }
            };

            // Analyze current/recent sleep stages to find optimal wake time
            const analyzeSleepStages = () => {
                if (!sleepStages || sleepStages.length === 0) {
                    addLog('No sleep stage data to analyze', 'error');
                    return;
                }

                // Map numeric stages to names: 1=deep, 2=light, 3=REM, 4=awake
                const stageMap = { '1': 'deep', '2': 'light', '3': 'REM', '4': 'awake' };
                
                addLog('--- SLEEP STAGE ANALYSIS ---', 'info');
                
                // Show last 12 intervals (last hour)
                const recentStages = sleepStages.slice(-12);
                const stageNames = recentStages.map(s => stageMap[s] || '?').join(' → ');
                addLog(`Last hour: ${stageNames}`, 'info');
                
                // Check if currently in light sleep
                const currentStageNum = sleepStages[sleepStages.length - 1];
                const currentStageName = stageMap[currentStageNum] || 'unknown';
                
                setCurrentStage({
                    stage: currentStageName,
                    timestamp: new Date().toLocaleTimeString(),
                    isOptimal: currentStageName === 'light' || currentStageName === 'awake'
                });
                
                if (currentStageName === 'light') {
                    addLog('✓ OPTIMAL WAKE TIME: Currently in LIGHT sleep!', 'success');
                } else if (currentStageName === 'awake') {
                    addLog('✓ Already awake - good time to wake up!', 'success');
                } else {
                    addLog(`Currently in ${currentStageName.toUpperCase()} sleep - not optimal`, 'info');
                }
            };

            // Real-time monitoring simulation
            const startMonitoring = () => {
                if (!isConnected) {
                    addLog('Please connect to Oura API first', 'error');
                    return;
                }

                if (!sleepStages || sleepStages.length === 0) {
                    addLog('No sleep stage data available. Try fetching sleep data first.', 'error');
                    return;
                }
                
                setIsMonitoring(true);
                addLog('--- MONITORING STARTED ---', 'success');
                addLog(`Alarm window: ${alarmWindow.start} - ${alarmWindow.end}`, 'info');
                addLog('NOTE: Real implementation would poll API every 5-10 min', 'info');
                
                // For demo: analyze current stage
                analyzeSleepStages();
            };

            const stopMonitoring = () => {
                setIsMonitoring(false);
                addLog('Monitoring stopped', 'info');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 p-6">
                    <div className="max-w-5xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-2xl overflow-hidden">
                            {/* Header */}
                            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white">
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <Moon />
                                    Oura Smart Alarm - Real API Integration
                                </h1>
                                <p className="mt-2 text-indigo-100">Connect to your Oura Ring and test real-time sleep data</p>
                            </div>

                            {/* API Connection */}
                            <div className="p-6 border-b border-gray-200">
                                <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                                    <Activity />
                                    Step 1: Connect to Oura API (OAuth 2.0)
                                </h2>
                                
                                {!authCode && !isConnected && (
                                    <div>
                                        <div className="grid grid-cols-2 gap-3 mb-3">
                                            <input
                                                type="text"
                                                placeholder="Client ID"
                                                value={clientId}
                                                onChange={(e) => setClientId(e.target.value)}
                                                className="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                            />
                                            <input
                                                type="password"
                                                placeholder="Client Secret"
                                                value={clientSecret}
                                                onChange={(e) => setClientSecret(e.target.value)}
                                                className="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                            />
                                        </div>
                                        <button
                                            onClick={startOAuthFlow}
                                            disabled={!clientId}
                                            className={`w-full px-6 py-3 rounded-lg font-medium ${
                                                !clientId
                                                    ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                                    : 'bg-indigo-600 text-white hover:bg-indigo-700'
                                            }`}
                                        >
                                            🔐 Authorize with Oura
                                        </button>
                                    </div>
                                )}
                                
                                {authCode && !isConnected && (
                                    <div>
                                        <div className="mb-3 p-3 bg-green-50 rounded-lg border border-green-200">
                                            <p className="text-sm text-green-800">
                                                ✓ Authorization code received! Now enter your Client Secret to complete the connection.
                                            </p>
                                        </div>
                                        <input
                                            type="password"
                                            placeholder="Client Secret"
                                            value={clientSecret}
                                            onChange={(e) => setClientSecret(e.target.value)}
                                            className="w-full px-4 py-2 mb-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                        <button
                                            onClick={exchangeCodeForToken}
                                            disabled={!clientSecret}
                                            className={`w-full px-6 py-3 rounded-lg font-medium ${
                                                !clientSecret
                                                    ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                                    : 'bg-green-600 text-white hover:bg-green-700'
                                            }`}
                                        >
                                            Complete Connection
                                        </button>
                                    </div>
                                )}
                                
                                {isConnected && (
                                    <div className="flex gap-3">
                                        <div className="flex-1 px-4 py-3 bg-green-50 border border-green-300 rounded-lg text-green-800 font-medium">
                                            ✓ Connected to Oura
                                        </div>
                                        <button
                                            onClick={() => fetchSleepSessions()}
                                            className="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700"
                                        >
                                            🔄 Refresh Data
                                        </button>
                                    </div>
                                )}
                                
                                <div className="mt-4 p-3 bg-blue-50 rounded-lg border border-blue-200">
                                    <p className="text-sm text-blue-900 mb-2">
                                        <strong>Get your OAuth credentials:</strong>
                                    </p>
                                    <ol className="text-sm text-blue-800 space-y-1 ml-4 list-decimal">
                                        <li>Visit <a href="https://cloud.ouraring.com/oauth/applications" target="_blank" rel="noopener noreferrer" className="underline font-medium">cloud.ouraring.com/oauth/applications</a></li>
                                        <li>Create a new application</li>
                                        <li>Set redirect URI to: <code className="bg-blue-100 px-1 rounded">{window.location.origin + window.location.pathname}</code></li>
                                        <li>Copy your Client ID and Client Secret</li>
                                    </ol>
                                    <p className="text-xs text-blue-700 mt-2">
                                        ⚠️ Note: Client Secret should be kept secure. In production, OAuth token exchange should happen on a backend server.
                                    </p>
                                </div>
                            </div>

                            {/* Sleep Data Summary */}
                            {sleepData && (
                                <div className="p-6 border-b border-gray-200 bg-gradient-to-r from-blue-50 to-indigo-50">
                                    <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                                        <TrendingUp />
                                        Latest Sleep Session
                                    </h2>
                                    <div className="grid grid-cols-4 gap-4">
                                        <div className="bg-white p-4 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Date</div>
                                            <div className="text-lg font-bold text-indigo-600 mt-1">
                                                {sleepData.day}
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Sleep Score</div>
                                            <div className="text-2xl font-bold text-green-600 mt-1">
                                                {sleepData.score || 'N/A'}
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Total Sleep</div>
                                            <div className="text-lg font-bold text-purple-600 mt-1">
                                                {Math.round(sleepData.total_sleep_duration / 60)} min
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Efficiency</div>
                                            <div className="text-lg font-bold text-blue-600 mt-1">
                                                {sleepData.efficiency || 'N/A'}%
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Alarm Window Setup */}
                            <div className="p-6 border-b border-gray-200">
                                <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                                    <Clock />
                                    Step 2: Set Wake-Up Window
                                </h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Earliest Wake Time
                                        </label>
                                        <input
                                            type="time"
                                            value={alarmWindow.start}
                                            onChange={(e) => setAlarmWindow(prev => ({ ...prev, start: e.target.value }))}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Latest Wake Time
                                        </label>
                                        <input
                                            type="time"
                                            value={alarmWindow.end}
                                            onChange={(e) => setAlarmWindow(prev => ({ ...prev, end: e.target.value }))}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Monitoring Controls */}
                            <div className="p-6 border-b border-gray-200">
                                <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                                    <Bell />
                                    Step 3: Analyze Sleep Stages
                                </h2>
                                <div className="flex gap-3">
                                    <button
                                        onClick={startMonitoring}
                                        disabled={!isConnected || isMonitoring || !sleepStages.length}
                                        className={`flex-1 px-6 py-3 rounded-lg font-medium ${
                                            !isConnected || isMonitoring || !sleepStages.length
                                                ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                                : 'bg-green-600 text-white hover:bg-green-700'
                                        }`}
                                    >
                                        {isMonitoring ? '⏳ Monitoring...' : '▶ Analyze Current Sleep Stage'}
                                    </button>
                                    {isMonitoring && (
                                        <button
                                            onClick={stopMonitoring}
                                            className="px-6 py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700"
                                        >
                                            ⏹ Stop
                                        </button>
                                    )}
                                </div>
                                <p className="mt-3 text-sm text-gray-600">
                                    Note: In a production app, this would poll the Oura API every 5-10 minutes during your alarm window to catch light sleep phases.
                                </p>
                            </div>

                            {/* Current Sleep Stage */}
                            {currentStage && (
                                <div className={`p-6 border-b border-gray-200 ${
                                    currentStage.isOptimal ? 'bg-green-50' : 'bg-amber-50'
                                }`}>
                                    <h2 className="text-xl font-semibold mb-4">Current Sleep Stage Analysis</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-6 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Sleep Stage</div>
                                            <div className={`text-3xl font-bold uppercase mt-1 ${
                                                currentStage.isOptimal ? 'text-green-600' : 'text-amber-600'
                                            }`}>
                                                {currentStage.stage}
                                            </div>
                                            <div className="mt-2 text-xs text-gray-500">
                                                {currentStage.timestamp}
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-lg shadow">
                                            <div className="text-sm text-gray-600">Wake Recommendation</div>
                                            <div className={`text-lg font-bold mt-1 ${
                                                currentStage.isOptimal ? 'text-green-600' : 'text-amber-600'
                                            }`}>
                                                {currentStage.isOptimal ? '✓ Optimal Time!' : '✗ Not Ideal'}
                                            </div>
                                            <div className="mt-2 text-sm text-gray-600">
                                                {currentStage.isOptimal 
                                                    ? 'Great time to wake up with minimal grogginess'
                                                    : 'Wait for light sleep or awake stage'}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Activity Log */}
                            <div className="p-6">
                                <h2 className="text-xl font-semibold mb-4">Activity Log</h2>
                                <div className="bg-gray-900 rounded-lg p-4 h-80 overflow-y-auto font-mono text-sm">
                                    {logs.length === 0 ? (
                                        <div className="text-gray-500">No activity yet. Enter your API key and click Connect.</div>
                                    ) : (
                                        logs.map((log, idx) => (
                                            <div key={idx} className={`mb-1 ${
                                                log.type === 'error' ? 'text-red-400' :
                                                log.type === 'success' ? 'text-green-400' :
                                                'text-gray-300'
                                            }`}>
                                                <span className="text-gray-500">[{log.timestamp}]</span> {log.message}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            {/* API Viability Assessment */}
                            <div className="p-6 bg-gradient-to-r from-amber-50 to-orange-50 border-t border-amber-200">
                                <h3 className="font-semibold text-amber-900 mb-3 flex items-center gap-2">
                                    <AlertCircle />
                                    Real-World Viability Assessment
                                </h3>
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div>
                                        <h4 className="font-semibold text-green-800 mb-2">✓ What Works</h4>
                                        <ul className="space-y-1 text-sm text-green-700">
                                            <li>• Sleep stage data is available (deep, light, REM, awake)</li>
                                            <li>• Data granularity: 5-minute intervals</li>
                                            <li>• Historical accuracy is excellent</li>
                                            <li>• API is well-documented and stable</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-red-800 mb-2">✗ Critical Limitations</h4>
                                        <ul className="space-y-1 text-sm text-red-700">
                                            <li>• <strong>5-15 minute data sync delay</strong> (not real-time)</li>
                                            <li>• iOS background fetch heavily restricted</li>
                                            <li>• Ring must sync via Bluetooth to phone</li>
                                            <li>• May miss brief light sleep windows</li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="mt-4 p-4 bg-white rounded-lg border-l-4 border-amber-500">
                                    <p className="text-sm text-gray-800">
                                        <strong>Verdict:</strong> Technically feasible but with compromises. The 5-15 minute delay means you'd need a 30-60 minute alarm window to reliably catch light sleep. Best used for "gentle wake-up" rather than "exact optimal moment." Consider pairing with device sensors (accelerometer) for better real-time detection.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<OuraSleepAlarmPrototype />, document.getElementById('root'));
    </script>
</body>
</html>
